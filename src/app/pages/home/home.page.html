<ion-content class="home-content" [fullscreen]="true">
  <div class="home-shell" *ngIf="vm$ | async as vm">
    <header class="app-header">
      <div class="brand">
        <div class="brand-icon"><img src="assets/images/logo-AuraBet.png" alt="AuraBet Logo"></div>
        <h1>AuraBet</h1>
      </div>
      <ion-button fill="clear" class="login-btn">
        <ion-icon slot="start" name="person-outline"></ion-icon>
        Entrar
      </ion-button>
    </header>

    <section class="leagues-scroll">
      <button
        *ngFor="let league of vm.leagues"
        type="button"
        [class.active]="vm.selectedLeague === league.id"
        (click)="selectLeague(league.id)"
      >
        {{ league.label }}
      </button>
    </section>

    <section class="section-header live">
      <span class="live-dot" aria-hidden="true"></span>
      <h2>Ao Vivo</h2>
    </section>

    <div class="live-cards-scroll" *ngIf="vm.liveMatches.length; else emptyLiveState">
      <app-match-card
        *ngFor="let match of vm.liveMatches; trackBy: trackByMatchId"
        class="live-card-item"
        [match]="match"
        [compact]="true"
        [showAi]="false"
        (cardClick)="openMatchDetails($event)"
      ></app-match-card>
    </div>

    <ng-template #emptyLiveState>
      <ion-list lines="none" class="cards-list compact-list">
        <ion-item class="empty-item">
          <ion-label>Nenhum jogo ao vivo nesta liga.</ion-label>
        </ion-item>
      </ion-list>
    </ng-template>

    <section class="section-header today">
      <h2>Jogos de Hoje</h2>
    </section>

    <ion-list lines="none" class="cards-list">
      <ion-item class="empty-item" *ngIf="!vm.todayMatches.length">
        <ion-label>Nenhum jogo disponivel para hoje.</ion-label>
      </ion-item>
      <app-match-card
        *ngFor="let match of vm.todayMatches; trackBy: trackByMatchId"
        [match]="match"
        (cardClick)="openMatchDetails($event)"
      ></app-match-card>
    </ion-list>
  </div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="center" edge="true" class="fab-ia">
    <ion-fab-button (click)="generateAiTip()">
      <ion-icon name="sparkles-outline"></ion-icon>
      <span>Gerar palpite com IA</span>
    </ion-fab-button>
  </ion-fab>
</ion-content>
